<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer">
          <button data-logout>Sign Out</button>
        </div>
      </aside>

      <!-- Main -->
      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1>Dashboard</h1>
          </div>
        </div>

        <div class="admin-cards" id="statsCards">
          <div class="admin-card">
            <div class="card-label">Total Clients</div>
            <div class="card-value" id="statClients">-</div>
          </div>
          <div class="admin-card">
            <div class="card-label">Active Projects</div>
            <div class="card-value" id="statProjects">-</div>
          </div>
          <div class="admin-card">
            <div class="card-label">Pending Quotations</div>
            <div class="card-value" id="statQuotations">-</div>
          </div>
          <div class="admin-card">
            <div class="card-label">Total Revenue</div>
            <div class="card-value" id="statRevenue">-</div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem">
          <div class="admin-table-wrap">
            <div class="admin-table-header"><h2>Recent Projects</h2></div>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Project</th>
                  <th>Client</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="recentProjects">
                <tr>
                  <td colspan="3" class="empty-state">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="admin-table-wrap">
            <div class="admin-table-header"><h2>Recent Payments</h2></div>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Receipt</th>
                  <th>Client</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody id="recentReceipts">
                <tr>
                  <td colspan="3" class="empty-state">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/dashboard.js"></script>
  </body>
</html>
