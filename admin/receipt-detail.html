<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt Detail — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer"><button data-logout>Sign Out</button></div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1 id="pageTitle">Receipt Detail</h1>
          </div>
          <div class="topbar-actions" id="actionButtons"></div>
        </div>

        <div id="receiptDetail">
          <div class="detail-section">
            <h3>Receipt Information</h3>
            <div class="detail-grid" id="receiptInfo"></div>
          </div>

          <div class="detail-section">
            <h3>Payment Summary</h3>
            <div class="admin-cards" id="paymentCards"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/receipts.js"></script>
  </body>
</html>
