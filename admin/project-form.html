<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer"><button data-logout>Sign Out</button></div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1 id="pageTitle">New Project</h1>
          </div>
          <div class="topbar-actions">
            <a href="/admin/projects" class="btn btn-secondary"
              >Back to Projects</a
            >
          </div>
        </div>

        <form id="projectForm" class="admin-form">
          <div class="form-row">
            <div class="form-group">
              <label for="client_id">Client *</label>
              <select id="client_id" name="client_id" required>
                <option value="">Select a client...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="quotation_id">Linked Quotation</label>
              <select id="quotation_id" name="quotation_id">
                <option value="">None</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="title">Title *</label>
              <input
                type="text"
                id="title"
                name="title"
                required
                placeholder="e.g. Solar Installation for Smith Residence"
              />
            </div>
            <div class="form-group">
              <label for="type">Type *</label>
              <select id="type" name="type" required>
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="site_address">Site Address</label>
            <input type="text" id="site_address" name="site_address" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="panel_count">Panel Count</label>
              <input
                type="number"
                id="panel_count"
                name="panel_count"
                min="0"
              />
            </div>
            <div class="form-group">
              <label for="capacity_kw">Capacity (kW)</label>
              <input
                type="number"
                id="capacity_kw"
                name="capacity_kw"
                min="0"
                step="0.1"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="inverter_details">Inverter Details</label>
              <input
                type="text"
                id="inverter_details"
                name="inverter_details"
              />
            </div>
            <div class="form-group">
              <label for="battery_details">Battery Details</label>
              <input type="text" id="battery_details" name="battery_details" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="start_date">Start Date</label>
              <input type="date" id="start_date" name="start_date" />
            </div>
            <div class="form-group">
              <label for="expected_completion">Expected Completion</label>
              <input
                type="date"
                id="expected_completion"
                name="expected_completion"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Project</button>
            <a href="/admin/projects" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/projects.js"></script>
  </body>
</html>
