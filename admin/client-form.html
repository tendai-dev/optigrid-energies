<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer"><button data-logout>Sign Out</button></div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1 id="pageTitle">New Client</h1>
          </div>
          <div class="topbar-actions">
            <a href="/admin/clients" class="btn btn-secondary"
              >Back to Clients</a
            >
          </div>
        </div>

        <form id="clientForm" class="admin-form">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="text" id="phone" name="phone" />
            </div>
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" name="city" />
            </div>
            <div class="form-group">
              <label for="type">Type *</label>
              <select id="type" name="type" required>
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Client</button>
            <a href="/admin/clients" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/clients.js"></script>
  </body>
</html>
