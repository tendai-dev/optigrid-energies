<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotations — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer"><button data-logout>Sign Out</button></div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1>Quotations</h1>
          </div>
          <div class="topbar-actions">
            <a href="/admin/quotation-form" class="btn btn-primary"
              >+ New Quotation</a
            >
          </div>
        </div>

        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <div class="admin-table-filters">
              <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Search quotations..."
              />
              <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="draft">Draft</option>
                <option value="sent">Sent</option>
                <option value="accepted">Accepted</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Number</th>
                <th>Client</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="quotationsBody">
              <tr>
                <td colspan="5" class="empty-state">Loading...</td>
              </tr>
            </tbody>
          </table>
          <div class="admin-table-footer" id="paginationWrap"></div>
        </div>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/quotations.js"></script>
  </body>
</html>
