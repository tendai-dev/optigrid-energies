<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Detail — OptiGrid CRM</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles-admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-header">
          <h2>OptiGrid CRM</h2>
          <span>Solar Project Management</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard">Dashboard</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/quotations">Quotations</a>
          <a href="/admin/projects">Projects</a>
          <a href="/admin/receipts">Receipts</a>
        </nav>
        <div class="sidebar-footer"><button data-logout>Sign Out</button></div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar">
          <div>
            <button class="mobile-menu-btn">Menu</button>
            <h1 id="pageTitle">Client Detail</h1>
          </div>
          <div class="topbar-actions" id="actionButtons"></div>
        </div>

        <div id="clientDetail">
          <div class="detail-section">
            <h3>Client Information</h3>
            <div class="detail-grid" id="clientInfo"></div>
          </div>

          <div class="admin-table-wrap">
            <div class="admin-table-header"><h2>Quotations</h2></div>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Number</th>
                  <th>Status</th>
                  <th>Total</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="clientQuotations">
                <tr>
                  <td colspan="4" class="empty-state">No quotations</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="admin-table-wrap">
            <div class="admin-table-header"><h2>Projects</h2></div>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Number</th>
                  <th>Title</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="clientProjects">
                <tr>
                  <td colspan="4" class="empty-state">No projects</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="admin-table-wrap">
            <div class="admin-table-header"><h2>Receipts</h2></div>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Number</th>
                  <th>Amount</th>
                  <th>Paid</th>
                </tr>
              </thead>
              <tbody id="clientReceipts">
                <tr>
                  <td colspan="3" class="empty-state">No receipts</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/clients.js"></script>
  </body>
</html>
